<!DOCTYPE html>
<html lang="lo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kickoff Cards Shop — POS</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    body {
      font-family: 'Noto Sans Lao', sans-serif;
    }
    
    .product-card {
      position: relative;
    }
    
    .best-seller-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: linear-gradient(135deg, #ff4d4d, #ff944d);
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
      box-shadow: 0 2px 8px rgba(255,77,77,0.4);
      z-index: 10;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @media (max-width: 768px) {
      header {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 10px;
        padding: 15px;
      }

      header .header-right {
        align-items: center !important;
      }

      main {
        flex-direction: column; 
        padding: 10px;
        gap: 15px;
      }

      .product-panel, .cart-panel {
        width: 100% !important;
      }

      .product-grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; 
        gap: 10px !important;
      }

      .section-title {
        flex-direction: column;
        align-items: flex-start !important;
        gap: 6px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚽</div>
    <div class="logo-text">
      <h1>Kickoff Cards Shop</h1>
      <span>Point of Sale System</span>
    </div>
  </div>
  <div class="header-right" style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
    <span class="clock" id="clock">00:00:00</span>
    <span style="font-size: 13px; color: #c9a84c; font-weight: 600; background: rgba(201,168,76,0.1); padding: 4px 12px; border-radius: 4px; border: 1px solid rgba(201,168,76,0.2); display: flex; align-items: center; gap: 4px;">
      📞 ຕິດຕໍ່ຮ້ານ: 20 78984385
    </span>
  </div>
</header>

<main>

  <section class="product-panel">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="ຄົ້ນຫາສິນຄ້າ... (ຊື່ ຫຼື ທີມ)" />
      <span class="icon">🔍</span>
    </div>

    <div class="section-title" style="display: flex; justify-content: space-between; align-items: center;">
      <span>⚽ ສິນຄ້າທັງໝົດ</span>
      <span style="font-size: 12px; color: #ff944d; background: rgba(255,77,77,0.1); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,77,77,0.2); font-weight: 600;">
        🔥 ສິນຄ້າຍອດນິຍົມປະຈຳອາທິດ
      </span>
    </div>
    
    <div class="product-grid" id="productGrid">
    </div>
  </section>

  <aside class="cart-panel">
    <div class="cart-header">
      <h2>🛒 ກະຕ່າ</h2>
      <span class="cart-count" id="cartCount">0</span>
    </div>

    <div class="cart-items" id="cartItems">
    </div>

    <div class="coupon-section">
      <div class="coupon-row">
        <input class="coupon-input" id="couponInput" type="text" placeholder="ລະຫັດສ່ວນຫຼຸດ..." maxlength="20" />
        <button class="btn-coupon" onclick="applyCoupon()">ນຳໃຊ້</button>
      </div>
      <div class="coupon-msg" id="couponMsg"></div>
    </div>

    <div class="cart-totals">
      <div class="total-row">
        <span>ລວມ</span>
        <span id="subtotalVal">0 ₭</span>
      </div>
      <div class="total-row discount" id="discountRow" style="display:none">
        <span>ສ່ວນຫຼຸດ</span>
        <span id="discountVal">−0 ₭</span>
      </div>
      <div class="total-row grand">
        <span>ລວມທັງໝົດ</span>
        <span id="totalVal">0 ₭</span>
      </div>
    </div>

    <div class="customer-section" style="margin: 15px 0; padding: 10px; background: #0d1b2a; border-radius: 6px;">
      <div style="margin-bottom: 8px;">
        <label for="customerName" style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 4px;">👤 ຊື່ລູກຄ້າ:</label>
        <input type="text" id="customerName" placeholder="ກະລຸນາປ້ອນຊື່ລູກຄ້າ" style="width: 100%; padding: 8px; border: 1px solid #0d1b2a; border-radius: 4px; box-sizing: border-box;" />
      </div>
      <div>
        <label for="customerPhone" style="font-size: 14px; font-weight: bold; display: block; margin-bottom: 4px;">📞 ເບີໂທລະສັບ:</label>
        <input type="text" id="customerPhone" placeholder="ກະລຸນາປ້ອນເບີໂທ" style="width: 100%; padding: 8px; border: 1px solid #0d1b2a; border-radius: 4px; box-sizing: border-box;" />
      </div>
    </div>

    <div class="cart-actions">
      <button class="btn-checkout" id="btnCheckout" onclick="checkout()" disabled>
        💳 ຊຳລະເງິນ
      </button>
      <button class="btn-clear" onclick="clearCart()">🗑 ລ້າງກະຕ່າ</button>
    </div>
  </aside>
</main>

<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h3>ຢືນຢັນການຊຳລະ</h3>
    <p>ທ່ານຕ້ອງການຊຳລະເງິນແລະພິມໃບບິນບໍ?</p>
    <div class="modal-btns">
      <button class="btn-confirm" onclick="confirmCheckout()">✓ ຢືນຢັນ</button>
      <button class="btn-cancel" onclick="cancelCheckout()">✕ ຍົກເລີກ</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
</body>
</html>
